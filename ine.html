<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Instagram</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #000000;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 15px;
      }

      .container {
        width: 100%;
        max-width: 380px;
        background: #0a0a0a;
        border: 1px solid #262626;
        border-radius: 12px;
        padding: 40px 30px 30px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      }

      .logo {
        font-size: 48px;
        font-weight: 700;
        background: linear-gradient(45deg, #f56040, #c13584, #405de6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 35px;
        letter-spacing: -1.5px;
      }

      .input-group {
        margin-bottom: 14px;
        position: relative;
      }

      input {
        width: 100%;
        padding: 13px 14px;
        background: #121212;
        border: 1px solid #363636;
        border-radius: 8px;
        font-size: 15px;
        color: #ffffff;
      }

      input:focus {
        outline: none;
        border-color: #0095f6;
        box-shadow: 0 0 0 3px rgba(0, 149, 246, 0.2);
      }

      .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        font-size: 17px;
        color: #8e8e8e;
        cursor: pointer;
      }

      .login-btn {
        width: 100%;
        padding: 11px;
        background: #0095f6;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        margin: 18px 0 12px;
        cursor: pointer;
      }

      .login-btn:active {
        background: #0077c5;
        transform: scale(0.98);
      }

      .forgot {
        color: #0095f6;
        text-decoration: none;
        font-size: 13.5px;
        display: block;
        margin: 15px 0 25px;
      }

      .divider {
        margin: 22px 0;
        color: #8e8e8e;
        position: relative;
        font-size: 13px;
      }

      .divider::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #262626;
      }

      .divider span {
        background: #0a0a0a;
        padding: 0 18px;
      }

      .social-btn {
        width: 100%;
        padding: 11px;
        background: #121212;
        border: 1px solid #363636;
        border-radius: 8px;
        font-size: 14.5px;
        font-weight: 600;
        color: #ffffff;
        margin-bottom: 12px;
        cursor: pointer;
      }

      .signup {
        margin-top: 40px;
        font-size: 14.5px;
        color: #a8a8a8;
      }

      .signup a {
        color: #0095f6;
        text-decoration: none;
        font-weight: 600;
      }

      .status {
        margin-top: 25px;
        font-size: 14px;
        min-height: 22px;
      }

      /* Better for mobile & tablet */
      @media (max-width: 480px) {
        .container {
          padding: 35px 25px;
          border-radius: 8px;
        }
        .logo {
          font-size: 44px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">Instagram</div>

      <form id="loginForm">
        <div class="input-group">
          <input
            type="text"
            id="loginId"
            placeholder="Phone number, username, or email"
            required
          />
        </div>

        <div class="input-group">
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
          <button type="button" class="toggle-password" id="toggleBtn">
            👁️
          </button>
        </div>

        <button type="submit" class="login-btn">Log in</button>
      </form>

      <a href="#" class="forgot">Forgot password?</a>

      <div class="divider"><span>OR</span></div>

      <button class="social-btn">Log in with Facebook</button>
      <button class="social-btn">Continue with Google</button>

      <div class="signup">Don't have an account? <a href="#">Sign up</a></div>

      <div id="status" class="status"></div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const status = document.getElementById("status");
      const toggleBtn = document.getElementById("toggleBtn");
      const passwordField = document.getElementById("password");

      // Password toggle
      toggleBtn.addEventListener("click", () => {
        if (passwordField.type === "password") {
          passwordField.type = "text";
          toggleBtn.textContent = "🙈";
        } else {
          passwordField.type = "password";
          toggleBtn.textContent = "👁️";
        }
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const loginId = document.getElementById("loginId").value.trim();
        const password = passwordField.value.trim();

        if (!loginId || !password) {
          status.style.color = "#ff4d4d";
          status.textContent = "Please fill all fields";
          return;
        }

        // Save credentials in localStorage
        localStorage.setItem("instagram_dark_loginId", loginId);
        localStorage.setItem("instagram_dark_password", password);

        status.style.color = "#00ff9d";
        status.textContent = "✅ Logged in successfully! Saved in localStorage";

        setTimeout(() => {
          alert(
            `Logged in as: ${loginId}\n\nCredentials saved in localStorage (Dark Mode Version).`,
          );
          console.log("=== Instagram Dark Login Saved ===");
          console.log("Login ID:", loginId);
          console.log("Password:", password);
        }, 1400);
      });
    </script>
  </body>
</html>
